services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atividros
      POSTGRES_USER: atividros
      POSTGRES_PASSWORD: atividros_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://atividros:atividros_secret@db:5432/atividros
      CHAVE_SECRETA: chave_secreta_producao
      DEBUG: "false"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
